<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HMF Shield — Analyzing</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0d0e16;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 16px;
        padding: 48px 40px;
        max-width: 520px;
        width: 100%;
        text-align: center;
      }
      .shield {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        margin: 0 auto 24px;
      }
      h1 {
        color: #e2e8f0;
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .subtitle {
        color: #64748b;
        font-size: 13px;
        margin-bottom: 32px;
      }
      .spinner-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 28px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #1e293b;
        border-top: 3px solid #7c3aed;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .url-box {
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 12px;
        color: #94a3b8;
        word-break: break-all;
        text-align: left;
        margin-bottom: 20px;
      }
      .url-label {
        font-size: 10px;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }
      .dots {
        display: inline-block;
      }
      .dots::after {
        content: '';
        animation: dots 1.4s steps(4, end) infinite;
      }
      @keyframes dots {
        0%   { content: ''; }
        25%  { content: '.'; }
        50%  { content: '..'; }
        75%  { content: '...'; }
      }
      .status-line {
        font-size: 12px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="shield">🛡️</div>
      <h1>Analyzing<span class="dots"></span></h1>
      <p class="subtitle">HMF Shield is checking this link for threats</p>

      <div class="spinner-wrap">
        <div class="spinner"></div>
      </div>

      <div class="url-box">
        <div class="url-label">Checking URL</div>
        <div id="url-display">Loading…</div>
      </div>

      <p class="status-line">Scanning against sandbox environment — this takes just a moment</p>
    </div>

    <script>
      const params = new URLSearchParams(location.search);
      const url = params.get("url") ?? "";
      document.getElementById("url-display").textContent = url || "Unknown URL";
    </script>
  </body>
</html>
